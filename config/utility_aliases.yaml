  - "Inc."
  - "Inc"
  - "Corporation"
  - "Corp."
  - "Corp"
  - "Company"
  - "Co."
  - "Co"
  - "LLC"
  - "LP"
  - "L.P."
  - "LLP"
  - "Ltd."
  - "Ltd"
  - "Limited"

# Common abbreviation expansions
abbreviation_expansions:
  "&": "and"
  "Elec.": "Electric"
  "Utils.": "Utilities"
  "Util.": "Utility"
  "So.": "Southern"
  "No.": "Northern"
  "Cal.": "California"
  "Penn.": "Pennsylvania"
  "Ind.": "Indiana"
  "Wash.": "Washington"
  "Ore.": "Oregon"
  "Dist.": "Distribution"
  "Nat.": "Natural"

# Fuzzy matching settings
fuzzy_match:
  algorithm: "token_sort_ratio"
  threshold: 85
  min_length: 3
